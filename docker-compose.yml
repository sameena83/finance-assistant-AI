services:
  app:
    build: .
    container_name: finance-assistant
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data        # persist PDFs, index, ground truth
    env_file:
      - .env
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: finance-db
    environment:
      POSTGRES_DB: finance_assistant
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

volumes:
  pgdata:
